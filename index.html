<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi página de cuestionarios</title>
    <link rel="stylesheet">
    <!-- Agrega la biblioteca de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.4.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.4.0/firebase-storage.js"></script>
  <style>
        /* Estilos CSS personalizados */
        .h1 {
            color: darkslateblue;
            font-size: 3em;
        }
        .jw-btn-style-flat.jw-btn__default-color {
            background-color: darkslateblue;
        }
        header {
            width: 100%;
            overflow: hidden;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        @media screen and (max-width: 600px) {
            .h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    
    <header class="header">
        <div class="header-content">
            <h1>Mis cuestionarios</h1>
            <div class="search-bar">
                <input type="text" placeholder="Buscar cuestionario...">
                <button type="button">Buscar</button>
            </div>
            <div class="filter">
                <!-- Aquí puedes colocar los elementos del filtro -->
            </div>
            <div class="header-buttons">
                <button type="button">Crear Cuestionario</button>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="left-column">
            <!-- Contenido de la columna izquierda -->
        </div>
        <div class="middle-column">
            <!-- Contenido de la columna central -->
        </div>
        <div class="right-column">
            <!-- Contenido de la columna derecha -->
        </div>
    </main>
</body>
     <script>

            messagingSenderId: "672187917157",
            appId: "1:672187917157:web:d80ac2d24681d5e45c3777"
        };
        
        // Inicializa Firebase
        firebase.initializeApp(firebaseConfig);

        // Función para subir un archivo
        function subirArchivo() {
            // Obtiene el archivo seleccionado por el usuario
            const file = document.getElementById('fileInput').files[0];
            
            // Crea una referencia al archivo en Firebase Storage
            const storageRef = firebase.storage().ref('archivos/' + file.name);
            
            // Sube el archivo a Firebase Storage
            const uploadTask = storageRef.put(file);
            
            // Maneja el éxito o el fallo de la carga
            uploadTask.then(snapshot => {
                console.log('Archivo subido exitosamente');
            }).catch(error => {
                console.error('Error al subir el archivo', error);
            });
        }
    </script>
</html>

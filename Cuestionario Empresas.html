<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario Empresas</title>
    <style>
        body {
            background-color: darkslateblue;
            color: white;
            margin-right: 100px; /* Ajuste para dejar espacio para los marcadores */
        }

        .correct { color: green; }
        .incorrect { color: red; }
        .question { margin-bottom: 30px; }
        .questionanswer { margin-right: 20px; }
        .answer-input { margin-left: 30px; margin-right: 10px; }
        .marker-container {
            position: fixed;
            top: 50px;
            right: 10px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: calc(100vh - 100px); /* Altura máxima del contenedor */
        }
        .marker {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 30px; /* Ancho suficiente para contener el número de pregunta y el ícono */
            height: 20px;
            border-radius: 50%;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 0 10px; /* Espaciado alrededor del ícono */
        }
        .marker.correct {questionNumber}, .marker.correct {background-color: green; }
        .marker.incorrect {questionNumber}, .marker.incorrect {background-color: red; }
        #timer {
            position: fixed;
            top: 10px;
            right: 80px;
            font-size: 18px;
        }
        #timer2 {
            display: none; /* Ocultar el segundo cronómetro inicialmente */
            position: fixed;
            top: 40px; /* Ajustar la posición del segundo cronómetro */
            right: 80px; /* Ajustar la posición del segundo cronómetro */
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Cuestionario Empresas</h1>
    <div id="quizForm">
        <!-- Aquí se agregarán las preguntas y respuestas dinámicamente -->
    </div>
    <div class="marker-container">
        <!-- Aquí se agregarán los marcadores de pregunta dinámicamente -->
    </div>

    <script src="https://josemlg993.github.io/MagicTest/Script.js"></script>
</body>
</html>

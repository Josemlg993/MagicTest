<!DOCTYPE html>
<html lang="es">

<head>
	<title>Magic Test</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" type="image/png" href="images/icons/favicon.ico" />
	<link rel="stylesheet" type="text/css" href="vendor/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="fonts/font-awesome-4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" type="text/css" href="fonts/iconic/css/material-design-iconic-font.min.css">
	<link rel="stylesheet" type="text/css" href="vendor/animate/animate.css">
	<link rel="stylesheet" type="text/css" href="vendor/css-hamburgers/hamburgers.min.css">
	<link rel="stylesheet" type="text/css" href="vendor/animsition/css/animsition.min.css">
	<link rel="stylesheet" type="text/css" href="vendor/select2/select2.min.css">
	<link rel="stylesheet" type="text/css" href="vendor/daterangepicker/daterangepicker.css">
	<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
	<link rel="stylesheet" type="text/css" href="css/util.css">
	<link rel="stylesheet" type="text/css" href="css/main.css">
</head>

<body>
	<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <!-- Usuario autenticado -->
                <span id="user-name" class="navbar-text me-auto ms-2"></span>
            </div>
            <div class="mx-auto">
                <a class="navbar-brand mx-auto" href="#">Magic Test</a>
            </div>
            <div class="d-flex justify-content-end">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                    aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item logged-out">
                            <a class="nav-link active" aria-current="page" href="#" data-bs-toggle="modal" data-bs-target="#loginModal">Iniciar
                                Sesión</a>
                        </li>
                        <li class="nav-item logged-out">
                            <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#registerModal">Registrarse</a>
                        </li>
                        <li class="nav-item logged-in">
                            <a class="nav-link" href="#" id="cerrarsesion" onclick="">Cerrar Sesión</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true" data-bs-backdrop="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="loginModalLabel">Iniciar sesión</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form class="login100-form validate-form" id="formInicio">
                        <div class="wrap-input100 validate-input m-b-23" data-validate="Email incorrecto">
                            <span class="label-input100">Nombre de usuario</span>
                            <input class="input100" type="email" name="username" id="login-email"
                                placeholder="Escribe tu nombre de usuario">
                            <span class="focus-input100" data-symbol="&#xf206;"></span>
                        </div>
    
                        <div class="wrap-input100 validate-input" data-validate="Se requiere contraseña">
                            <span class="label-input100">Contraseña</span>
                            <input class="input100" type="password" name="pass" id="login-password"
                                placeholder="Escribe tu contraseña">
                            <span class="focus-input100" data-symbol="&#xf190;"></span>
                        </div>
    
                        <div class="text-right p-t-8 p-b-31">
                            <a href="#">
                                ¿Olvidaste tu contraseña?
                            </a>
                        </div>
    
                        <div class="container-login100-form-btn">
                            <div class="wrap-login100-form-btn">
                                <div class="login100-form-bgbtn"></div>
                                <button class="login100-form-btn">
                                    Iniciar sesión
                                </button>
                            </div>
                        </div>
    
                        <div class="flex-c-m p-t-40">
                            <button type="button" id="FacebookLogin" class="login100-social-item bg1">
                                <i class="fa fa-facebook"></i>
                            </button>
                            <button type="button" id="GoogleLogin" class="login100-social-item bg3">
                                <i class="fa fa-google"></i>
                            </button>
                        </div>
    
                        <div class="flex-col-c p-t-40">
                            <span class="txt1 p-b-17">
                                O Regístrate usando tu correo electrónico.
                            </span>
                            <a href="#" class="txt2" data-bs-toggle="modal" data-bs-target="#registerModal" data-bs-dismiss="modal">
                                Registrarse
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Register Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true" data-bs-backdrop="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="registerModalLabel">Registrarse</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form class="login100-form validate-form" id="formregistro">
                        <div class="wrap-input100 validate-input m-b-23" data-validate="Email inválido">
                            <span class="label-input100">Usuario</span>
                            <input class="input100" type="email" id="registraremail" name="username" placeholder="Escribe tu Email">
                            <span class="focus-input100" data-symbol="&#xf206;"></span>
                        </div>

                        <div class="wrap-input100 validate-input" data-validate="Debe tener más de 6 caracteres.">
                            <span class="label-input100">Contraseña</span>
                            <input class="input100" type="password" id="registrarcontraseña" name="pass"
                                placeholder="Escribe tu contraseña">
                            <span class="focus-input100" data-symbol="&#xf190;"></span>
                        </div>

                        <div class="container-login100-form-btn">
                            <div class="wrap-login100-form-btn">
                                <div class="login100-form-bgbtn"></div>
                                <button class="login100-form-btn">
                                    Registrar
                                </button>
                            </div>
                        </div>

                        <div class="flex-c-m p-t-40">
                            <button type="button" id="FacebookLogin" class="login100-social-item bg1">
                                <i class="fa fa-facebook"></i>
							</button>
                            <button type="button" id="GoogleLoginRegister" class="login100-social-item bg3">
                                <i class="fa fa-google"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>



	<script src="vendor/jquery/jquery-3.2.1.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/animsition/js/animsition.min.js"></script>
    <script src="vendor/bootstrap/js/popper.js"></script>
    <script src="vendor/select2/select2.min.js"></script>
    <script src="vendor/daterangepicker/moment.min.js"></script>
    <script src="vendor/daterangepicker/daterangepicker.js"></script>
    <script src="vendor/countdowntime/countdowntime.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="js/main.js" type="module"></script>
</body>
</html>

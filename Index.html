    <!-- Script para cambiar el contenido HTML por el de GitHub -->
     <script>
        // Función para cargar el contenido de GitHub
        function loadGitHubContent(buttonId, githubHtmlUrl) {
            document.getElementById(buttonId).addEventListener('click', function() {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', githubHtmlUrl, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        document.open();
                        document.write(xhr.responseText);
                        document.close();
                    }
                };
                xhr.send();
            });
        }

        // Carga el contenido de GitHub para cada botón
        loadGitHubContent('empresas-button', 'https://raw.githubusercontent.com/Josemlg993/MagicTest/HTML/Cuestionario%20Empresas.html');
        loadGitHubContent('analisis-button', 'https://raw.githubusercontent.com/Josemlg993/MagicTest/HTML/Cuestionario%20Analisis.html');
        loadGitHubContent('ingles-button', 'https://raw.githubusercontent.com/Josemlg993/MagicTest/HTML/Cuestionario%20Ingles.html');
        loadGitHubContent('inmuno-button', 'https://raw.githubusercontent.com/Josemlg993/MagicTest/HTML/Cuestionario%20Inmuno.html');
        loadGitHubContent('microbiology-button', 'https://raw.githubusercontent.com/Josemlg993/MagicTest/HTML/Cuestionario%20Micro.html');
        loadGitHubContent('hematologico-button', 'https://raw.githubusercontent.com/Josemlg993/MagicTest/HTML/Cuestionario%20Hemato.html');

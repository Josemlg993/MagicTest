<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Test</title>
    <link href="https://assets.jwwb.nl/assets/website-rendering/styles.a0115ee46dc5487527c7.css?bust=a0115ee46dc5487527c7" media="screen" rel="stylesheet" type="text/css">
    <link type="text/css" rel="stylesheet" href="https://primary.jwwb.nl/public/r/q/q/temp-dmsdigievaaklrjuztsk/style.css?bust=1714205582">
    <style>
        /* Estilos CSS personalizados */
        .h1 {
            color: darkslateblue;
            font-size: 3em;
        }
        .jw-btn-style-flat.jw-btn__default-color {
            background-color: darkslateblue;
        }
        header {
            width: 100%;
            overflow: hidden;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        @media screen and (max-width: 600px) {
            .h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="jw-background"></div>
    <div class="jw-body">
        <header>
            <div class="clearfix header-wrap">
                <div class="logo">
                    <h1 id="h1" class="h1">Cuestionarios Ana</h1>
                </div>
            </div>
        </header>
        <div class="text-wrap">
            <div class="jw-btn-is-center">
                <a id="empresas-button" class="jw-element-content jw-btn jw-btn-sm jw-btn-style-flat jw-btn__default-color jw-btn-rounded">Empresas e Iniciativa Emprendedora</a>
            </div>
            </div><br>
            <div>
            <div class="jw-btn-is-center">
                <a id="analisis-button" class="jw-element-content jw-btn jw-btn-sm jw-btn-style-flat jw-btn__default-color jw-btn-rounded">Analisis Bioquímico</a>
            </div>
            </div><br>
            <div>
            <div class="jw-btn-is-center">
                <a id="ingles-button" class="jw-element-content jw-btn jw-btn-sm jw-btn-style-flat jw-btn__default-color jw-btn-rounded">Inglés</a>
            </div>
            </div><br>
            <div>
            <div class="jw-btn-is-center">
                <a id="inmuno-button" class="jw-element-content jw-btn jw-btn-sm jw-btn-style-flat jw-btn__default-color jw-btn-rounded">Técnicas de Inmunodiagnóstico</a>
            </div>
            </div><br>
            <div>
            <div class="jw-btn-is-center">
                <a id="microbiology-button" class="jw-element-content jw-btn jw-btn-sm jw-btn-style-flat jw-btn__default-color jw-btn-rounded">Microbiología Clínica</a>
            </div><br>
            <div>
            </div>
            <div class="jw-btn-is-center">
                <a id="hematologico-button" class="jw-element-content jw-btn jw-btn-sm jw-btn-style-flat jw-btn__default-color jw-btn-rounded">Técnicas de análisis hematológico</a>
            </div>
        </div>
    </div>

    <script>
        // Función para cargar el contenido de GitHub
        function loadGitHubContent(buttonId, githubHtmlUrl) {
            document.getElementById(buttonId).addEventListener('click', function() {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', githubHtmlUrl, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        document.open();
                        document.write(xhr.responseText);
                        document.close();
                    }
                };
                xhr.send();
            });
        }

        // Carga el contenido de GitHub para cada botón
        var buttons = document.querySelectorAll('.jw-element-content.jw-btn');
        buttons.forEach(function(button) {
            var buttonId = button.getAttribute('id');
            var githubHtmlUrl = 'https://raw.githubusercontent.com/Josemlg993/MagicTest/HTML/Cuestionario%20' + buttonId.split('-')[0] + '.html';
            loadGitHubContent(buttonId, githubHtmlUrl);
        });
    </script>
</body>
</html>
